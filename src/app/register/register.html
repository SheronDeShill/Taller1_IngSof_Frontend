<div class="register-container">
  <h2>Crear Cuenta de Chat</h2>
  <form (ngSubmit)="onSubmit()">
    <div>
      <label>Nombre de Usuario:</label>
      <input type="text" [(ngModel)]="nuevoUsuario.nombre_usuario" name="nombre_usuario" required>
    </div>
    
    <div>
      <label>Correo Electrónico:</label>
      <input type="email" [(ngModel)]="nuevoUsuario.email" name="email" required>
    </div>
    
    <div>
      <label>Contraseña:</label>
      <input type="password" [(ngModel)]="nuevoUsuario.contrasena" name="contrasena" required>
    </div>
    
    <button type="submit">Registrarse en el Sistema</button>
  </form>
  
  <p>¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a></p>
</div>
