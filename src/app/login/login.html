<div class="login-container">
  <h2>Iniciar Sesión</h2>
  <form (ngSubmit)="onLogin()">
    <div>
      <label>Email:</label>
      <input type="email" [(ngModel)]="credenciales.email" name="email" required>
    </div>
    
    <div>
      <label>Contraseña:</label>
      <input type="password" [(ngModel)]="credenciales.contrasena" name="contrasena" required>
    </div>
    
    <button type="submit">Entrar</button>
  </form>
  
  <p>¿No tienes cuenta? <a href="/register">Regístrate aquí</a></p>
</div>
